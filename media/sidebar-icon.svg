<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Bridge deck -->
  <path d="M 1 15 Q 12 17 23 15" stroke-width="1.8"/>

  <!-- Left tower -->
  <line x1="6" y1="7" x2="6" y2="15.3"/>
  <!-- Left tower cap -->
  <line x1="4.5" y1="7" x2="7.5" y2="7"/>

  <!-- Right tower -->
  <line x1="18" y1="7" x2="18" y2="15.3"/>
  <!-- Right tower cap -->
  <line x1="16.5" y1="7" x2="19.5" y2="7"/>

  <!-- Left suspension cable (anchor to tower top) -->
  <path d="M 1 11 Q 3.5 5 6 7" fill="none"/>
  <!-- Main cable (tower to tower catenary) -->
  <path d="M 6 7 Q 12 12 18 7" fill="none"/>
  <!-- Right suspension cable (tower top to anchor) -->
  <path d="M 18 7 Q 20.5 5 23 11" fill="none"/>

  <!-- Vertical suspender cables -->
  <line x1="9" y1="9.5" x2="9" y2="15.5" stroke-width="0.8" opacity="0.6"/>
  <line x1="12" y1="11" x2="12" y2="16" stroke-width="0.8" opacity="0.6"/>
  <line x1="15" y1="9.5" x2="15" y2="15.5" stroke-width="0.8" opacity="0.6"/>

  <!-- Small dots at cable anchors to suggest connectivity -->
  <circle cx="1" cy="11" r="1" fill="currentColor" stroke="none"/>
  <circle cx="23" cy="11" r="1" fill="currentColor" stroke="none"/>
</svg>
